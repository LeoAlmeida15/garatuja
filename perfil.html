
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Kane - Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0000ff 0%, #1a00cc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f0f0f0;
            margin: 0 auto 30px;
            overflow: hidden;
            border: 4px solid #ddd;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nome {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            margin-bottom: 20px;
        }

        .bio {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-instagram {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-instagram:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            width: 100%;
        }

        .copyright {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            .nome {
                font-size: 26px;
            }

            .bio {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">
            <img src="" alt="Harry Kane">
        </div>
        
        <h1 class="nome">Harry Kane</h1>
        
        <p class="bio">
          Jogador de Futebol no FC Bayern e na seleção inglesa
        </p>
        
        <a href="https://www.instagram.com/harrykane/" class="btn-instagram" target="_blank" >Instagram</a>
    </div>

    <div class="footer">
        <div class="copyright">
            <span>©</span>
            <span>2026 Leonardo V. Todos os direitos reservados.</span>
        </div>
    </div>
</body>
</html>
